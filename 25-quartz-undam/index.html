<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Quartz Ceramic × 언담 — Room Room</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Noto+Serif+TC:wght@300;400&family=Noto+Serif+KR:wght@300;400&display=swap" rel="stylesheet">
<style>
  @font-face { font-family: 'JFLanYangMing'; src: url('../jf-lanyangming-2_0-book.otf') format('opentype'); font-weight: 400; }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg:#e8ebe6; --surface:#f5f2ed; --card:#edeae3; --border:#c8c4bc; --green:#4a6860; --green-lt:#8fa89e; --text:#1e1c19; --sub:#9a9690; --muted:#b0ada6; }
  html,body { min-height:100%; background:var(--bg); }
  body { font-family:'JFLanYangMing','Noto Serif TC',serif; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:2rem 1.25rem; gap:1.5rem; }
  .card { background:var(--surface); border-radius:20px; border:0.5px solid var(--border); width:100%; max-width:400px; padding:2rem 1.75rem; display:flex; flex-direction:column; gap:1.5rem; }
  .logo-area { display:flex; justify-content:center; padding-bottom:1.25rem; border-bottom:0.5px solid var(--border); }
  .logo-area img { height:28px; width:auto; }
  .brand { display:flex; flex-direction:column; gap:4px; }
  .room-no { font-family:'EB Garamond',serif; font-style:italic; font-size:11px; letter-spacing:0.18em; color:var(--sub); }
  .brand-name { font-family:'EB Garamond',serif; font-size:22px; font-weight:500; color:var(--text); letter-spacing:0.02em; line-height:1.2; }
  .subtitle-box { background:var(--card); border:0.5px solid var(--border); border-radius:8px; padding:1.25rem 1.25rem 1.25rem 1.5rem; min-height:100px; display:flex; flex-direction:column; justify-content:center; gap:8px; position:relative; transition:border-color 0.4s ease; }
  .subtitle-box::before { content:''; position:absolute; left:0; top:20%; bottom:20%; width:2px; background:var(--green-lt); border-radius:2px; opacity:0; transition:opacity 0.4s ease; }
  .subtitle-box.active { border-color:var(--green-lt); }
  .subtitle-box.active::before { opacity:1; }
  .sub-idle { font-family:'EB Garamond',serif; font-style:italic; font-size:13px; color:var(--muted); text-align:center; letter-spacing:0.04em; }
  .sub-orig { font-family:'Noto Serif KR',serif; font-size:12px; font-weight:300; color:var(--sub); line-height:1.8; display:none; }
  .sub-trans { font-family:'JFLanYangMing','Noto Serif TC',serif; font-size:13.5px; font-weight:400; color:var(--text); line-height:1.85; letter-spacing:0.06em; display:none; }
  .player { display:flex; flex-direction:column; align-items:center; gap:12px; }
  .progress-row { width:100%; display:flex; align-items:center; gap:10px; }
  .progress-bar { flex:1; height:1px; background:var(--border); border-radius:1px; cursor:pointer; position:relative; }
  .progress-fill { position:absolute; left:0; top:0; height:100%; background:var(--green); border-radius:1px; width:0%; transition:width 0.1s linear; }
  .time-display { font-family:'EB Garamond',serif; font-size:12px; color:var(--sub); letter-spacing:0.04em; min-width:28px; text-align:right; }
  .play-btn { width:46px; height:46px; border-radius:50%; border:0.5px solid var(--green); background:transparent; color:var(--green); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background 0.2s ease; -webkit-tap-highlight-color:transparent; }
  .play-btn:hover { background:rgba(74,104,96,0.08); }
  .play-btn svg { width:16px; height:16px; fill:currentColor; }
  .play-btn .icon-pause { display:none; }
  .play-btn.playing .icon-play { display:none; }
  .play-btn.playing .icon-pause { display:block; }
  .footer { font-family:'EB Garamond',serif; font-style:italic; font-size:11px; color:var(--muted); text-align:center; letter-spacing:0.08em; }
  audio { display:none; }
</style>
</head>

<audio id="a2" src="undam.m4a" preload="metadata"></audio>

<script>
const data = {
  1: {
    audio: null, btn: null, fill: null, time: null, box: null, idle: null, orig: null, trans: null,
    cues: [
      { start:0.0, end:11.0, original:'안녕하세요, Quartz Ceramic입니다. Quartz Ceramic은 사막의 능선에서 보이는 곡선과 자연의 율동감에서 영감을 받아 작업합니다.', translation:'您好，我是 Quartz Ceramic。我們的創作靈感來自沙漠山脊的曲線，以及大自然中富有律動感的形態。' },
      { start:11.0, end:16.0, original:'이번 RoomRoom에서는 이러한 흐름을 담은 테이블웨어를 전시하고 있습니다.', translation:'這次在 RoomRoom 展出中，我們呈現了承載這種流動感的餐桌器皿作品。' },
      { start:16.0, end:26.7, original:'곡선에서 보여지는 차분한 무드를 통해 일상 속에 자연스럽게 스며드는 도자를 만나보시길 바랍니다. 감사합니다.', translation:'希望透過曲線所展現的沉靜氛圍，讓陶器能自然融入日常生活之中。謝謝。' }
    ]
  },
  2: {
    audio: null, btn: null, fill: null, time: null, box: null, idle: null, orig: null, trans: null,
    cues: [
      { start:0.5, end:7.0, original:'안녕하세요, 언담 입니다. 이번 RoomRoom에서는 분청사기 차도구 작업들을 선보이고 있습니다.', translation:'您好，我是 언담。這次在 RoomRoom，我們展出了粉青沙器的茶器作品。' },
      { start:7.0, end:17.0, original:'저희의 작업은 분청사기 특유의 소박함과 투박한 질감을 중요하게 생각하며, 그 안에서 언담만의 색과 분위기를 담아내고 있습니다.', translation:'我們的創作重視粉青沙器特有的質樸與粗獷質感，並在其中融入屬於「언담」的色彩與氛圍。' },
      { start:17.0, end:26.0, original:'이 공간 안에서 천천히 작품을 보시면서 편안하고 담백한 감각을 느껴주셨으면 좋겠습니다. 감사합니다.', translation:'希望大家能在這個空間中，慢慢欣賞作品，感受那份安靜、純粹且舒適的感知。謝謝大家。' }
    ]
  }
};

function init() {
  [1,2].forEach(id => {
    const d = data[id];
    d.audio = document.getElementById('a'+id);
    d.btn   = document.getElementById('btn'+id);
    d.fill  = document.getElementById('fill'+id);
    d.time  = document.getElementById('time'+id);
    d.box   = document.getElementById('box'+id);
    d.idle  = document.getElementById('idle'+id);
    d.orig  = document.getElementById('orig'+id);
    d.trans = document.getElementById('trans'+id);

    d.audio.addEventListener('loadedmetadata', () => { d.time.textContent = fmt(d.audio.duration); });
    d.audio.addEventListener('timeupdate', () => {
      const pct = d.audio.duration ? (d.audio.currentTime/d.audio.duration)*100 : 0;
      d.fill.style.width = pct+'%';
      d.time.textContent = fmt(d.audio.duration - d.audio.currentTime);
      updateSub(d);
    });
    d.audio.addEventListener('ended', () => {
      d.btn.classList.remove('playing');
      updateSub(d);
    });
    document.getElementById('bar'+id).addEventListener('click', e => {
      if (!d.audio.duration) return;
      const r = document.getElementById('bar'+id).getBoundingClientRect();
      d.audio.currentTime = ((e.clientX-r.left)/r.width)*d.audio.duration;
    });
  });
}

function fmt(s) { if(isNaN(s)||s<0)return'—'; return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0'); }

function updateSub(d) {
  const t = d.audio.currentTime;
  const cue = d.cues.find(c => t >= c.start && t < c.end);
  if (cue) {
    d.idle.style.display = 'none';
    d.orig.style.display = 'block';
    d.trans.style.display = 'block';
    d.orig.innerHTML = cue.original;
    d.trans.innerHTML = cue.translation;
    d.box.classList.add('active');
  } else {
    d.idle.style.display = 'block';
    d.orig.style.display = 'none';
    d.trans.style.display = 'none';
    d.idle.textContent = d.audio.ended ? '播放結束' : '按下播放，聆聽品牌介紹';
    d.box.classList.remove('active');
  }
}

function toggle(id) {
  const d = data[id];
  const other = data[id===1?2:1];
  if (!d.audio.paused) {
    d.audio.pause(); d.btn.classList.remove('playing');
  } else {
    other.audio.pause(); other.btn.classList.remove('playing');
    d.audio.play(); d.btn.classList.add('playing');
  }
}

init();
</script>
