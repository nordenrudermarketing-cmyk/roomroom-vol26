<title>SUSU.illustration — Room Room</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Noto+Serif+TC:wght@300;400&display=swap" rel="stylesheet">
<style>
  @font-face { font-family: 'JFLanYangMing'; src: url('../jf-lanyangming-2_0-book.otf') format('opentype'); font-weight: 400; }
  @font-face { font-family: 'JFLanYangMing'; src: url('../jf-lanyangming-2_0-semibold.otf') format('opentype'); font-weight: 600; }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg:#e8ebe6; --surface:#f5f2ed; --card:#edeae3; --border:#c8c4bc; --green:#4a6860; --green-lt:#8fa89e; --text:#1e1c19; --sub:#9a9690; --muted:#b0ada6; }
  html,body { min-height:100%; background:var(--bg); }
  body { font-family:'JFLanYangMing','Noto Serif TC',serif; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:2rem 1.25rem; }
  .card { background:var(--surface); border-radius:20px; border:0.5px solid var(--border); width:100%; max-width:400px; padding:2rem 1.75rem; display:flex; flex-direction:column; gap:1.5rem; }
  .logo-area { display:flex; justify-content:center; padding-bottom:1.25rem; border-bottom:0.5px solid var(--border); }
  .logo-area img { height:28px; width:auto; }
  .brand { display:flex; flex-direction:column; gap:4px; }
  .room-no { font-family:'EB Garamond',serif; font-style:italic; font-size:11px; letter-spacing:0.18em; color:var(--sub); }
  .brand-name-en { font-family:'EB Garamond',serif; font-size:22px; font-weight:500; color:var(--text); letter-spacing:0.02em; line-height:1.2; }
  .subtitle-box { background:var(--card); border:0.5px solid var(--border); border-radius:8px; padding:1.25rem 1.25rem 1.25rem 1.5rem; min-height:110px; display:flex; flex-direction:column; justify-content:center; gap:8px; position:relative; transition:border-color 0.4s ease; }
  .subtitle-box::before { content:''; position:absolute; left:0; top:20%; bottom:20%; width:2px; background:var(--green-lt); border-radius:2px; opacity:0; transition:opacity 0.4s ease; }
  .subtitle-box.active { border-color:var(--green-lt); }
  .subtitle-box.active::before { opacity:1; }
  .sub-idle { font-family:'EB Garamond',serif; font-style:italic; font-size:13px; color:var(--muted); text-align:center; letter-spacing:0.04em; }
  .sub-text { font-family:'JFLanYangMing','Noto Serif TC',serif; font-size:14px; font-weight:400; color:var(--text); line-height:1.85; letter-spacing:0.06em; display:none; }
  .player { display:flex; flex-direction:column; align-items:center; gap:14px; }
  .progress-row { width:100%; display:flex; align-items:center; gap:10px; }
  .progress-bar { flex:1; height:1px; background:var(--border); border-radius:1px; cursor:pointer; position:relative; }
  .progress-fill { position:absolute; left:0; top:0; height:100%; background:var(--green); border-radius:1px; width:0%; transition:width 0.1s linear; }
  .time-display { font-family:'EB Garamond',serif; font-size:12px; color:var(--sub); letter-spacing:0.06em; min-width:30px; text-align:right; }
  .play-btn { width:50px; height:50px; border-radius:50%; border:0.5px solid var(--green); background:transparent; color:var(--green); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background 0.2s ease; -webkit-tap-highlight-color:transparent; }
  .play-btn:hover { background:rgba(74,104,96,0.08); }
  .play-btn svg { width:18px; height:18px; fill:currentColor; }
  .play-btn .icon-pause { display:none; }
  .play-btn.playing .icon-play { display:none; }
  .play-btn.playing .icon-pause { display:block; }
  .footer { font-family:'EB Garamond',serif; font-style:italic; font-size:11px; color:var(--muted); text-align:center; letter-spacing:0.1em; border-top:0.5px solid var(--border); padding-top:0.75rem; }
  audio { display:none; }
</style>
</head>

<audio id="audio" src="SUSU_illustration_.m4a" preload="metadata"></audio>
<script>
const cues = [
  { start:0.5, end:5.0, text:'大家好，我是 SUSU.illustration 的蘇蘇。' },
  { start:5.0, end:11.0, text:'這次在 RoomRoom 展出的是關於尋找自我的過程創作。' },
  { start:11.0, end:16.5, text:'希望大家進來房間內可以感受到保有初心的愉快！謝謝大家。' }
];
const audio=document.getElementById('audio');
const playBtn=document.getElementById('playBtn');
const progressBar=document.getElementById('progressBar');
const progressFill=document.getElementById('progressFill');
const timeDisplay=document.getElementById('timeDisplay');
const subtitleBox=document.getElementById('subtitleBox');
const idleMsg=document.getElementById('idleMsg');
const subText=document.getElementById('subText');
function fmtTime(s){ if(isNaN(s)||s<0)return'—'; return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0'); }
function updateSubtitle(t){
  const cue=cues.find(c=>t>=c.start&&t<c.end);
  if(cue){ idleMsg.style.display='none'; subText.style.display='block'; subText.innerHTML=cue.text; subtitleBox.classList.add('active'); }
  else{ subText.style.display='none'; idleMsg.style.display='block'; idleMsg.textContent=audio.ended?'播放結束':'按下播放，聆聽品牌介紹'; subtitleBox.classList.remove('active'); }
}
playBtn.addEventListener('click',()=>{ if(audio.paused){ audio.play(); playBtn.classList.add('playing'); } else{ audio.pause(); playBtn.classList.remove('playing'); } });
audio.addEventListener('timeupdate',()=>{ const pct=audio.duration?(audio.currentTime/audio.duration)*100:0; progressFill.style.width=pct+'%'; timeDisplay.textContent=fmtTime(audio.duration-audio.currentTime); updateSubtitle(audio.currentTime); });
audio.addEventListener('loadedmetadata',()=>{ timeDisplay.textContent=fmtTime(audio.duration); });
audio.addEventListener('ended',()=>{ playBtn.classList.remove('playing'); progressFill.style.width='100%'; updateSubtitle(999); });
progressBar.addEventListener('click',(e)=>{ if(!audio.duration)return; const rect=progressBar.getBoundingClientRect(); audio.currentTime=((e.clientX-rect.left)/rect.width)*audio.duration; });
</script>
